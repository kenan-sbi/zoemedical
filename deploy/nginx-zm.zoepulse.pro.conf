# Reverse proxy for zm.zoepulse.pro -> the Zoe Medical container (127.0.0.1:3010).
# The Hetzner box already terminates HTTPS for zoepulse.pro with nginx/1.29.8, so this fits that
# setup. Adds a NEW server block for the subdomain — it does NOT touch the existing zoepulse.pro site.
#
# Install:
#   sudo cp deploy/nginx-zm.zoepulse.pro.conf /etc/nginx/sites-available/zm.zoepulse.pro
#   sudo ln -s /etc/nginx/sites-available/zm.zoepulse.pro /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d zm.zoepulse.pro     # issue/attach the TLS cert
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name zm.zoepulse.pro;
    # certbot will add the 443 block + redirect. If managing certs manually, redirect here:
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name zm.zoepulse.pro;

    # certbot fills these in (ssl_certificate / ssl_certificate_key).

    client_max_body_size 50m;   # allow large document/photo uploads

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 120s;   # extraction can take a while on big documents
    }
}
